<!-- ============================================
     [SCREEN] Public self-registration form
     Member opens /join.html?t=<gym join_token>, fills name + phone, submits.
     Creates a PENDING member the gym owner then verifies. No auth.
     ============================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - GymExec</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="assets/config.js"></script>
    <script src="assets/toast.js"></script>
    <style>
        :root { --surface-border: rgba(255,255,255,0.1); --text-muted: #94a3b8; }
        * { box-sizing: border-box; }
        body {
            background: #050505; color: #f8fafc; margin: 0; min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex; padding: 24px 16px;
        }
        .card {
            background: rgba(15,23,42,0.85); border: 1px solid var(--surface-border);
            border-radius: 24px; padding: 32px 26px; width: 100%; max-width: 420px;
            margin: auto; box-shadow: 0 40px 80px -20px rgba(0,0,0,0.5);
        }
        .badge { display:inline-block; font-size:11px; font-weight:800; letter-spacing:1px;
            text-transform:uppercase; color:#4ade80; background:rgba(34,197,94,0.12);
            padding:5px 14px; border-radius:100px; margin-bottom:16px; }
        h1 { font-size: 24px; margin: 0 0 4px; }
        p.sub { color: var(--text-muted); font-size: 14px; margin: 0 0 24px; }
        label { display:block; font-size:13px; font-weight:600; color:#cbd5e1; margin:14px 0 6px; }
        input, select {
            width:100%; padding:13px 14px; border-radius:12px; border:1px solid var(--surface-border);
            background:rgba(0,0,0,0.3); color:#fff; font-size:15px; font-family:inherit;
        }
        input:focus, select:focus { outline:none; border-color:#22c55e; }
        .btn {
            width:100%; margin-top:22px; padding:15px; border:none; border-radius:12px;
            background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; font-size:16px;
            font-weight:700; cursor:pointer; font-family:inherit;
        }
        .btn:disabled { opacity:.6; cursor:not-allowed; }
        .note { font-size:12px; color:var(--text-muted); margin-top:14px; text-align:center; line-height:1.5; }
        #done, #invalid { display:none; text-align:center; }
        .big-icon { font-size:52px; display:block; margin-bottom:14px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="loading" style="text-align:center; color:var(--text-muted); font-size:13px; letter-spacing:1px;">LOADING…</div>

        <div id="form-wrap" style="display:none;">
            <span class="badge" id="gym-badge">GYM</span>
            <h1>Join the gym</h1>
            <p class="sub">Fill in your details and the gym will verify your membership.</p>

            <label for="f-name">Full name</label>
            <input type="text" id="f-name" autocomplete="name" placeholder="Your name">

            <label for="f-phone">Phone number</label>
            <input type="tel" id="f-phone" inputmode="numeric" autocomplete="tel" placeholder="10-digit mobile number">

            <label for="f-email">Email <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
            <input type="email" id="f-email" autocomplete="email" placeholder="you@example.com">

            <div id="plan-wrap" style="display:none;">
                <label for="f-plan">Plan you want <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
                <select id="f-plan"><option value="">— Select a plan —</option></select>
            </div>

            <button class="btn" id="submit-btn" onclick="submitJoin()">Submit</button>
            <p class="note">Your details go to the gym for verification — you'll be added once they confirm.</p>
        </div>

        <div id="done">
            <span class="big-icon">✅</span>
            <h1 id="done-title">Submitted!</h1>
            <p class="sub" id="done-msg" style="margin-top:8px;"></p>
        </div>

        <div id="invalid">
            <span class="big-icon">🔗</span>
            <h1>Link not valid</h1>
            <p class="sub" style="margin-top:8px;">This join link isn't valid. Please ask your gym for the correct link.</p>
        </div>
    </div>

    <script>
        const token = new URLSearchParams(location.search).get('t');

        async function init() {
            if (!token) { showInvalid(); return; }
            try {
                const r = await fetch(`${CONFIG.API_BASE_URL}/api/public/join/${encodeURIComponent(token)}`);
                if (!r.ok) throw new Error('invalid');
                const d = await r.json();
                document.getElementById('gym-badge').textContent = (d.gym_name || 'Your Gym').toUpperCase();
                // Offer the gym's plans if it has any.
                const plans = d.plans || [];
                if (plans.length) {
                    const sel = document.getElementById('f-plan');
                    plans.forEach(p => {
                        const o = document.createElement('option');
                        o.value = p.name;
                        o.textContent = p.price ? `${p.name} — ₹${Number(p.price).toLocaleString('en-IN')}` : p.name;
                        sel.appendChild(o);
                    });
                    document.getElementById('plan-wrap').style.display = 'block';
                }
                document.getElementById('loading').style.display = 'none';
                document.getElementById('form-wrap').style.display = 'block';
            } catch (e) { showInvalid(); }
        }
        function showInvalid() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('form-wrap').style.display = 'none';
            document.getElementById('invalid').style.display = 'block';
        }

        async function submitJoin() {
            const name = document.getElementById('f-name').value.trim();
            const phone = document.getElementById('f-phone').value.trim();
            const email = document.getElementById('f-email').value.trim();
            const plan_name = (document.getElementById('f-plan').value || '').trim() || null;
            if (name.length < 2) { window.showToast && showToast('Please enter your name.', 'error'); return; }
            if (phone.replace(/\D/g, '').length < 10) { window.showToast && showToast('Enter a valid 10-digit phone number.', 'error'); return; }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.textContent = 'Submitting…';
            try {
                const r = await fetch(`${CONFIG.API_BASE_URL}/api/public/join/${encodeURIComponent(token)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, email: email || null, plan_name }),
                });
                const d = await r.json().catch(() => ({}));
                if (!r.ok) {
                    const msg = (typeof d.detail === 'string') ? d.detail : 'Could not submit — please try again.';
                    window.showToast && showToast(msg, 'error');
                    btn.disabled = false; btn.textContent = 'Submit';
                    return;
                }
                // Show the friendly result (submitted / already registered / already submitted).
                document.getElementById('form-wrap').style.display = 'none';
                document.getElementById('done').style.display = 'block';
                const titles = { submitted: 'Submitted!', already_registered: "You're in ✓", already_submitted: 'Already submitted' };
                document.getElementById('done-title').textContent = titles[d.status] || 'Done';
                document.getElementById('done-msg').textContent = d.message || '';
            } catch (e) {
                window.showToast && showToast('Network error — please try again.', 'error');
                btn.disabled = false; btn.textContent = 'Submit';
            }
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Check In - GymFlow Kiosk</title>
    <script src="assets/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a; color: #f1f5f9;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Header */
        .kiosk-header {
            text-align: center; padding: 32px 20px 16px;
        }
        .kiosk-header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .kiosk-header p { font-size: 14px; color: #64748b; margin-top: 4px; }

        /* Phone Display */
        .phone-display {
            text-align: center; padding: 20px;
        }
        .phone-number {
            font-size: 48px; font-weight: 800; letter-spacing: 6px;
            color: #fff; min-height: 60px;
            border-bottom: 3px solid rgba(99,102,241,0.3);
            display: inline-block; min-width: 300px; padding-bottom: 8px;
        }
        .phone-hint { font-size: 12px; color: #475569; margin-top: 8px; }

        /* Numpad */
        .numpad {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; padding: 16px 40px; max-width: 420px; margin: 0 auto;
            flex: 1;
        }
        .num-btn {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; font-size: 32px; font-weight: 700; color: #fff;
            padding: 18px; cursor: pointer; transition: all 0.1s;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .num-btn:active { background: rgba(99,102,241,0.2); transform: scale(0.96); }
        .num-btn.action-clear { background: rgba(239,68,68,0.1); color: #f87171; font-size: 20px; }
        .num-btn.action-clear:active { background: rgba(239,68,68,0.2); }

        /* Check-In Button */
        .checkin-btn {
            display: block; width: calc(100% - 80px); max-width: 420px; margin: 0 auto 24px;
            padding: 20px; font-size: 22px; font-weight: 800; border: none;
            border-radius: 14px; cursor: pointer; transition: all 0.15s;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff; letter-spacing: 0.5px;
        }
        .checkin-btn:active { transform: scale(0.98); }
        .checkin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Result Overlay */
        .result-overlay {
            position: fixed; inset: 0; display: none;
            align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(12px);
        }
        .result-overlay.active { display: flex; }
        .result-card {
            text-align: center; padding: 48px 40px; border-radius: 24px;
            max-width: 460px; width: 90%;
            animation: popIn 0.3s ease;
        }
        .result-card.success { background: rgba(16,185,129,0.12); border: 2px solid rgba(16,185,129,0.3); }
        .result-card.warning { background: rgba(245,158,11,0.12); border: 2px solid rgba(245,158,11,0.3); }
        .result-card.error { background: rgba(239,68,68,0.12); border: 2px solid rgba(239,68,68,0.3); }
        .result-icon { font-size: 72px; margin-bottom: 16px; }
        .result-name { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .result-msg { font-size: 16px; color: #94a3b8; }
        .result-plan { font-size: 13px; color: #64748b; margin-top: 12px; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Exit button */
        .exit-btn {
            position: fixed; top: 16px; right: 16px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: #64748b; font-size: 12px; padding: 8px 14px; border-radius: 8px;
            cursor: pointer; z-index: 50;
        }
    </style>
</head>
<body>
    <button class="exit-btn" onclick="window.location.href='branch-dashboard.html'">✕ Exit Kiosk</button>

    <div class="kiosk-header">
        <h1>💪 GymFlow Check-In</h1>
        <p>Enter your phone number to check in</p>
    </div>

    <div class="phone-display">
        <div class="phone-number" id="phone-display">_</div>
        <div class="phone-hint">Enter your 10-digit phone number</div>
    </div>

    <div class="numpad">
        <button class="num-btn" onclick="addDigit('1')">1</button>
        <button class="num-btn" onclick="addDigit('2')">2</button>
        <button class="num-btn" onclick="addDigit('3')">3</button>
        <button class="num-btn" onclick="addDigit('4')">4</button>
        <button class="num-btn" onclick="addDigit('5')">5</button>
        <button class="num-btn" onclick="addDigit('6')">6</button>
        <button class="num-btn" onclick="addDigit('7')">7</button>
        <button class="num-btn" onclick="addDigit('8')">8</button>
        <button class="num-btn" onclick="addDigit('9')">9</button>
        <button class="num-btn action-clear" onclick="clearAll()">Clear</button>
        <button class="num-btn" onclick="addDigit('0')">0</button>
        <button class="num-btn action-clear" onclick="backspace()">⌫</button>
    </div>

    <button class="checkin-btn" id="checkin-btn" onclick="doCheckin()" disabled>CHECK IN</button>

    <!-- Result Overlay -->
    <div class="result-overlay" id="result-overlay">
        <div class="result-card" id="result-card">
            <div class="result-icon" id="result-icon">✅</div>
            <div class="result-name" id="result-name"></div>
            <div class="result-msg" id="result-msg"></div>
            <div class="result-plan" id="result-plan"></div>
        </div>
    </div>

    <script>
        let phone = '';
        const branchId = new URLSearchParams(window.location.search).get('branch') || localStorage.getItem('branch_id');
        const gymId = new URLSearchParams(window.location.search).get('gym') || localStorage.getItem('gym_id');
        const display = document.getElementById('phone-display');
        const btn = document.getElementById('checkin-btn');

        function addDigit(d) {
            if (phone.length >= 10) return;
            phone += d;
            updateDisplay();
        }

        function backspace() {
            phone = phone.slice(0, -1);
            updateDisplay();
        }

        function clearAll() {
            phone = '';
            updateDisplay();
        }

        function updateDisplay() {
            display.textContent = phone || '_';
            btn.disabled = phone.length < 4;
        }

        async function doCheckin() {
            btn.disabled = true;
            btn.textContent = 'Checking in...';

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/checkin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone,
                        branch_id: branchId ? parseInt(branchId) : null,
                        gym_id: gymId ? parseInt(gymId) : null
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    if (res.status === 403) {
                        showResult('error', '🔒', 'Check-in Unavailable', err.detail || 'This gym\'s plan does not include kiosk check-in. Please see the front desk.', '');
                    } else {
                        showResult('error', '❌', 'Not Found', err.detail || 'No member found with this number.', '');
                    }
                    return;
                }

                const data = await res.json();
                const type = data.member_status === 'expired' ? 'warning' :
                             data.member_status === 'expiring_soon' ? 'warning' : 'success';
                const icon = type === 'success' ? '✅' : '⚠️';

                showResult(type, icon, data.member_name, data.message,
                    data.plan_name ? `${data.plan_name}${data.plan_expiry ? ' • Expires: ' + data.plan_expiry : ''}` : '');
            } catch (err) {
                showResult('error', '❌', 'Error', 'Could not connect to server.', '');
            } finally {
                btn.disabled = false;
                btn.textContent = 'CHECK IN';
            }
        }

        function showResult(type, icon, name, msg, plan) {
            const overlay = document.getElementById('result-overlay');
            const card = document.getElementById('result-card');
            card.className = `result-card ${type}`;
            document.getElementById('result-icon').textContent = icon;
            document.getElementById('result-name').textContent = name;
            document.getElementById('result-msg').textContent = msg;
            document.getElementById('result-plan').textContent = plan;
            overlay.classList.add('active');

            // Auto-dismiss after 4 seconds
            setTimeout(() => {
                overlay.classList.remove('active');
                phone = '';
                updateDisplay();
            }, 4000);
        }

        // Keyboard support (for physical keyboard)
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') addDigit(e.key);
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Enter' && phone.length >= 4) doCheckin();
            else if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>

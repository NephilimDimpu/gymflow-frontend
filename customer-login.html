<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="manifest" href="manifest-customer.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <title>Customer Login - GymExec</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="assets/config.js"></script>
    <script src="assets/toast.js"></script>
    <script src="assets/theme.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        .ambient-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .ambient-bg::before, .ambient-bg::after {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: float 20s infinite alternate ease-in-out;
        }

        .ambient-bg::before {
            background: linear-gradient(to right, #4f46e5, #ec4899);
            top: -200px;
            left: -200px;
        }

        .ambient-bg::after {
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        .auth-card {
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
            text-align: center;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-header {
            margin-bottom: 2.5rem;
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.0));
            border: 1px solid var(--borderHighlight);
            margin-bottom: 1.5rem;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
            font-size: 24px;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .modern-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .modern-input::placeholder {
            color: #52525b;
        }

        .modern-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--text-main);
            color: #000;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            position: relative;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(255, 255, 255, 0.15);
        }
        
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        /* Tab switcher */
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
        }
        .auth-tab {
            flex: 1;
            padding: 0.65rem 1rem;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .auth-tab.active {
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
        }

        /* Phone prefix */
        .phone-wrapper {
            display: flex;
            align-items: stretch;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .phone-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .phone-prefix {
            display: flex;
            align-items: center;
            padding: 0 12px;
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            border-right: 1px solid var(--border);
            user-select: none;
            white-space: nowrap;
        }
        .phone-prefix-flag { margin-right: 6px; font-size: 1.1rem; }
        .phone-input-clean {
            flex: 1;
            padding: 0.875rem 1rem;
            background: rgba(0,0,0,0.2);
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }
        .phone-input-clean::placeholder { color: #52525b; }

        #error-message, #success-message {
            display: none;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }

        #error-message {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        #success-message {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" style="text-decoration: none; display: inline-block; margin-bottom: 1.5rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="2" y="2" width="44" height="44" rx="12" fill="#6366f1"/><path d="M24 10C16.27 10 10 16.27 10 24s6.27 14 14 14c5.8 0 10.8-3.53 12.95-8.54" stroke="#fff" stroke-width="3.5" stroke-linecap="round" fill="none"/><line x1="24" y1="24" x2="36" y2="24" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/><rect x="27" y="20.5" width="2.5" height="3.5" rx="0.8" fill="rgba(255,255,255,0.5)"/><rect x="31" y="17.5" width="2.5" height="6.5" rx="0.8" fill="rgba(255,255,255,0.7)"/><rect x="35" y="14" width="2.5" height="10" rx="0.8" fill="rgba(255,255,255,0.9)"/></svg>
            </a>
            <h1>Member Portal</h1>
            <p>Ready to hit your goals today?</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
            <button class="auth-tab" onclick="switchTab('register')">First Time Setup</button>
        </div>

        <div id="error-message"></div>
        <div id="success-message"></div>

        <!-- LOGIN FORM -->
        <form id="customer-login-form">
            <div class="input-group">
                <label for="phone">Phone Number</label>
                <div class="phone-wrapper">
                    <span class="phone-prefix"><span class="phone-prefix-flag">🇮🇳</span> +91</span>
                    <input type="tel" id="phone" class="phone-input-clean" placeholder="9876543210"
                           maxlength="10" inputmode="numeric" pattern="[0-9]{10}" required>
                </div>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="modern-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn" id="login-btn">Log In</button>
            <p class="footer-link" style="margin-top: 1.25rem; font-size: 0.8rem;">
                First time? Switch to <a href="#" onclick="switchTab('register'); return false;">First Time Setup</a> to set your password.
            </p>
        </form>

        <!-- REGISTER FORM -->
        <form id="customer-register-form" style="display:none;">
            <div style="background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); border-radius: 12px; padding: 0.85rem 1rem; margin-bottom: 1.5rem; text-align: left;">
                <p style="font-size: 0.82rem; color: #a5b4fc; line-height: 1.5; margin: 0;">
                    Your gym must have already added you as a member. Enter the same phone number they registered you with.
                </p>
            </div>
            <div class="input-group">
                <label for="reg-phone">Phone Number</label>
                <div class="phone-wrapper">
                    <span class="phone-prefix"><span class="phone-prefix-flag">🇮🇳</span> +91</span>
                    <input type="tel" id="reg-phone" class="phone-input-clean" placeholder="9876543210"
                           maxlength="10" inputmode="numeric" pattern="[0-9]{10}" required>
                </div>
            </div>
            <div class="input-group">
                <label for="reg-email">Email <span style="color: var(--text-muted); font-weight: 400;">(optional)</span></label>
                <input type="email" id="reg-email" class="modern-input" placeholder="you@email.com">
            </div>
            <div class="input-group">
                <label for="reg-password">Create Password</label>
                <input type="password" id="reg-password" class="modern-input" placeholder="Min 6 characters" required minlength="6">
            </div>
            <div class="input-group">
                <label for="reg-confirm">Confirm Password</label>
                <input type="password" id="reg-confirm" class="modern-input" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" class="submit-btn" id="register-btn">Create Account</button>
            <p class="footer-link" style="margin-top: 1.25rem; font-size: 0.8rem;">
                Already set up? <a href="#" onclick="switchTab('login'); return false;">Log in here</a>
            </p>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
            <a href="login.html" style="font-size: 0.85rem; color: var(--text-muted); text-decoration: none;">
                Gym Owner / Staff? Sign in here
            </a>
        </div>
    </div>
<script>
        // Get gym_id from URL (e.g., customer-login.html?gym_id=1)
        const urlParams = new URLSearchParams(window.location.search);
        const gymId = urlParams.get('gym_id') ? parseInt(urlParams.get('gym_id')) : null;

        // Auto-switch to register tab if ?tab=register
        if (urlParams.get('tab') === 'register') switchTab('register');

        // Check if already logged in as customer
        const existingToken = localStorage.getItem('auth_token');
        const existingRole = localStorage.getItem('role');
        if (existingToken && existingRole === 'customer') {
            window.location.href = 'customer-dashboard.html';
        }

        // ── Tab Switching ──
        function switchTab(tab) {
            hideMessages();
            const tabs = document.querySelectorAll('.auth-tab');
            tabs[0].classList.toggle('active', tab === 'login');
            tabs[1].classList.toggle('active', tab === 'register');
            document.getElementById('customer-login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('customer-register-form').style.display = tab === 'register' ? 'block' : 'none';
        }

        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('error-message').style.display = 'none';
            const s = document.getElementById('success-message');
            if (s) s.style.display = 'none';
        }

        // Strip non-digits on phone inputs
        document.querySelectorAll('.phone-input-clean').forEach(el => {
            el.addEventListener('input', () => { el.value = el.value.replace(/\D/g, ''); });
        });

        // ── Login ──
        document.getElementById('customer-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;

            if (!phone || !password) { showError('Please enter both phone and password.'); return; }
            if (phone.length !== 10) { showError('Enter a 10-digit phone number (without +91).'); return; }

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const payload = { phone, password };
                if (gymId) payload.gym_id = gymId;

                const res = await fetch(`${CONFIG.API_BASE_URL}/api/customer/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Login failed');
                }

                const data = await res.json();
                localStorage.setItem('auth_token', data.access_token);
                localStorage.setItem('member_id', data.member_id);
                localStorage.setItem('member_name', data.member_name);
                localStorage.setItem('gym_name', data.gym_name || '');
                localStorage.setItem('branch_name', data.branch_name || '');
                localStorage.setItem('user_type', 'customer');
                localStorage.setItem('role', 'customer');

                window.location.href = 'customer-dashboard.html';

            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                btn.textContent = 'Log In';
            }
        });

        // ── Register (First Time Setup) ──
        document.getElementById('customer-register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const phone = document.getElementById('reg-phone').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (!phone || phone.length !== 10) { showError('Enter your 10-digit phone number.'); return; }
            if (!password || password.length < 6) { showError('Password must be at least 6 characters.'); return; }
            if (password !== confirm) { showError('Passwords do not match.'); return; }
            if (!gymId) { showError('Missing gym info. Please use the link your gym shared with you.'); return; }

            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = 'Setting up...';

            try {
                const payload = { phone, password, gym_id: gymId };
                if (email) payload.email = email;

                const res = await fetch(`${CONFIG.API_BASE_URL}/api/customer/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Registration failed');
                }

                const data = await res.json();
                localStorage.setItem('auth_token', data.access_token);
                localStorage.setItem('member_id', data.member_id);
                localStorage.setItem('member_name', data.member_name);
                localStorage.setItem('gym_name', data.gym_name || '');
                localStorage.setItem('branch_name', data.branch_name || '');
                localStorage.setItem('user_type', 'customer');
                localStorage.setItem('role', 'customer');

                window.location.href = 'customer-dashboard.html';

            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>

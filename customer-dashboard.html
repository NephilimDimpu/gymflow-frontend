<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Membership - GymFlow</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/config.js"></script>
    <script src="assets/toast.js"></script>
    <style>
        :root {
            --accent: var(--theme-primary, #6366f1);
            --surface: rgba(255, 255, 255, 0.03);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }

        body {
            background: #050505;
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #050505 80%);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        .navbar {
            backdrop-filter: blur(12px);
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--surface-border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-logout {
            background: transparent;
            color: #f8fafc;
            border: 1px solid var(--surface-border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: var(--surface);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .welcome-section {
            margin-bottom: 40px;
        }

        .welcome-section h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .welcome-section p {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            transition: transform 0.3s, border-color 0.3s;
        }

        /* Membership Premium Card */
        .membership-status {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .membership-status::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .plan-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-active { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-expired { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .status-pending { background: rgba(234, 179, 8, 0.1); color: #fbbf24; border: 1px solid rgba(234, 179, 8, 0.2); }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 24px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Quick Actions */
        .action-btns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }

        .action-card {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .action-card span {
            font-size: 24px;
            display: block;
            margin-bottom: 12px;
        }

        .action-card div {
            font-weight: 600;
            font-size: 14px;
        }

        /* History Table */
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-row {
            border-bottom: 1px solid var(--surface-border);
            padding: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-info h4 { margin: 0; font-size: 15px; }
        .history-info p { margin: 4px 0 0; font-size: 13px; color: var(--text-muted); }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal-card {
            background: #0f172a;
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .plan-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--surface-border);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plan-option:hover, .plan-option.selected {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 14px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
    <script src="assets/theme.js"></script>
</head>

<body>
    <div class="ambient-bg">
        <div class="blob" style="top: -100px; right: -100px;"></div>
        <div class="blob" style="bottom: -100px; left: -100px; background: #ec4899;"></div>
    </div>

    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">GymFlow — Member Portal</div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span id="user-name" style="font-size: 14px; font-weight: 500; color: var(--text-muted);">Member</span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-section">
            <h1>Hey, <span id="member-name" style="color: var(--accent);">Member</span>!</h1>
            <p id="gym-label">Loading gym info...</p>
        </div>

        <!-- Membership Card -->
        <div id="membership-section">
            <div class="glass-card" style="text-align: center; color: var(--text-muted);">
                Loading your membership status...
            </div>
        </div>

        <!-- Actions -->
        <div style="margin: 40px 0 20px;">
            <h3 style="font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 16px;">
                Quick Actions
            </h3>
            <div class="action-btns">
                <div class="action-card" onclick="openRenewalModal()">
                    <span>🔄</span>
                    <div>Renew Plan</div>
                </div>
                <div class="action-card" onclick="scrollToHistory()">
                    <span>📋</span>
                    <div>Payment History</div>
                </div>
                <div class="action-card" onclick="viewProfile()">
                    <span>👤</span>
                    <div>My Profile</div>
                </div>
            </div>
        </div>

        <!-- Profile (Collapsible) -->
        <div id="profile-section" style="display: none; margin-top: 32px;">
            <div class="glass-card">
                <h3 style="margin-top: 0; display: flex; align-items: center; gap: 10px;">
                    <span>👤</span> Profile Details
                </h3>
                <div id="profile-card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 20px;">
                    <div>
                        <label style="font-size: 11px; text-transform: uppercase; color: var(--text-muted);">Name</label>
                        <p id="profile-name" style="margin: 4px 0 0; font-weight: 600;">Loading...</p>
                    </div>
                    <div>
                        <label style="font-size: 11px; text-transform: uppercase; color: var(--text-muted);">Phone</label>
                        <p id="profile-phone" style="margin: 4px 0 0; font-weight: 600;"></p>
                    </div>
                    <div>
                        <label style="font-size: 11px; text-transform: uppercase; color: var(--text-muted);">Email</label>
                        <p id="profile-email" style="margin: 4px 0 0; font-weight: 600;"></p>
                    </div>
                    <div>
                        <label style="font-size: 11px; text-transform: uppercase; color: var(--text-muted);">Gym/Branch</label>
                        <p id="profile-gym-branch" style="margin: 4px 0 0; font-weight: 600;"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- history -->
        <div id="history-section" style="margin-top: 48px;">
            <h3 style="font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 24px;">
                Payment Activity
            </h3>
            <div class="glass-card" id="history-container" style="padding: 0;">
                <div id="history-list" style="padding: 8px 0;">
                    <div style="padding: 32px; text-align: center; color: #475569;">Loading history...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Renewal Modal -->
    <div class="modal-overlay" id="renewal-modal">
        <div class="modal-card">
            <h2 style="margin-top: 0; font-size: 24px; letter-spacing: -0.5px;">Extend Membership</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 32px;">Select a plan to continue your fitness journey.</p>
            
            <div id="plan-options" style="margin-bottom: 32px;">
                <!-- Plans load here -->
            </div>

            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn-primary" id="confirm-renew-btn" onclick="confirmRenewal()" disabled>Proceed to Payment</button>
                <button class="btn-secondary" onclick="closeRenewalModal()">Maybe Later</button>
            </div>
        </div>
    </div>

    <script>
        // Auth check
        const token = localStorage.getItem('auth_token');
        const role = localStorage.getItem('role');
        if (!token || role !== 'customer') {
            window.location.href = 'customer-login.html';
        }

        const memberName = localStorage.getItem('member_name') || 'Member';
        document.getElementById('member-name').textContent = memberName;
        document.getElementById('user-name').textContent = memberName;

        let selectedPlanId = null;

        async function loadMembership() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/customer/membership`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const section = document.getElementById('membership-section');
                if (!res.ok) {
                    section.innerHTML = `
                        <div class="glass-card" style="border-color: #ef444455; text-align: center;">
                            <h3 style="margin: 0; color: #f87171;">Membership Expired</h3>
                            <p style="color: var(--text-muted); margin: 12px 0 20px;">Your membership is currently inactive.</p>
                            <button class="btn-primary" style="width: auto; padding: 10px 24px;" onclick="openRenewalModal()">Renew Now</button>
                        </div>`;
                    return;
                }

                const data = await res.json();
                
                // Update gym info header
                document.getElementById('gym-label').textContent = `${data.gym_name} • ${data.branch_name || 'Main Branch'}`;

                const statusClass = data.is_active ? 'status-active' :
                    data.payment_status === 'pending' ? 'status-pending' : 'status-expired';
                
                const statusText = data.is_active ? 'Active' :
                    data.payment_status === 'pending' ? 'Pending Payment' : 'Expired';

                section.innerHTML = `
                    <div class="glass-card membership-status">
                        <div class="plan-header">
                            <div>
                                <h2 class="plan-title">${data.plan_name}</h2>
                                <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Valid until ${data.expiry_date}</p>
                            </div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        
                        <div class="stats-row">
                            <div class="stat-item">
                                <span class="stat-value" style="color: var(--accent);">${data.days_left}</span>
                                <span class="stat-label">Days Left</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value">₹${data.amount_paid.toLocaleString()}</span>
                                <span class="stat-label">Amount</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value" style="font-size: 14px;">${data.payment_status.toUpperCase()}</span>
                                <span class="stat-label">Status</span>
                            </div>
                        </div>
                    </div>`;
            } catch (err) {
                console.error(err);
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/customer/history`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const history = await res.json();
                const container = document.getElementById('history-list');

                if (history.length === 0) {
                    container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">No recent activity</div>';
                    return;
                }

                container.innerHTML = history.map(h => `
                    <div class="history-row" style="padding: 16px 32px;">
                        <div class="history-info">
                            <h4>${h.plan_name}</h4>
                            <p>${h.payment_date || 'N/A'}</p>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: 700;">₹${h.amount.toLocaleString()}</div>
                            <div style="font-size: 11px; color: ${h.payment_status === 'paid' ? '#4ade80' : '#fbbf24'}; text-transform: uppercase;">${h.payment_status}</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function viewProfile() {
            const section = document.getElementById('profile-section');
            if (section.style.display === 'block') {
                section.style.display = 'none';
                return;
            }

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/customer/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const profile = await res.json();

                document.getElementById('profile-name').textContent = profile.name;
                document.getElementById('profile-phone').textContent = profile.phone;
                document.getElementById('profile-email').textContent = profile.email || 'N/A';
                document.getElementById('profile-gym-branch').textContent = `${profile.gym_name} (${profile.branch_name || 'Main'})`;
                
                section.style.display = 'block';
                section.scrollIntoView({ behavior: 'smooth' });
            } catch (err) { window.showToast("Failed to load profile", "error"); }
        }

        async function openRenewalModal() {
            document.getElementById('renewal-modal').classList.add('active');
            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/customer/plans`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const plans = await res.json();
                const container = document.getElementById('plan-options');
                
                container.innerHTML = plans.map(p => `
                    <div class="plan-option" onclick="selectPlan(${p.id}, this)">
                        <div>
                            <div style="font-weight: 700;">${p.name}</div>
                            <div style="font-size: 13px; color: var(--text-muted);">${p.duration_days} Days</div>
                        </div>
                        <div style="font-weight: 800; color: var(--accent);">₹${p.price.toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (err) { /* silent */ }
        }

        function selectPlan(id, el) {
            selectedPlanId = id;
            document.querySelectorAll('.plan-option').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('confirm-renew-btn').disabled = false;
        }

        function closeRenewalModal() {
            document.getElementById('renewal-modal').classList.remove('active');
        }

        async function confirmRenewal() {
            if (!selectedPlanId) return;
            const btn = document.getElementById('confirm-renew-btn');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/customer/renew`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ plan_id: selectedPlanId })
                });

                if (!res.ok) throw new Error('Failed to create renewal');
                const data = await res.json();
                
                window.showToast("Success! Redirecting to payment...", "success");
                setTimeout(() => {
                    window.location.href = `pay.html?id=${data.membership_id}`;
                }, 1500);
            } catch (err) {
                window.showToast(err.message, "error");
                btn.disabled = false;
                btn.textContent = 'Proceed to Payment';
            }
        }

        function scrollToHistory() {
            document.getElementById('history-section').scrollIntoView({ behavior: 'smooth' });
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'customer-login.html';
        }

        loadMembership();
        loadHistory();
    </script>
</body>

</html>

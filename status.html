<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Status</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/config.js"></script>
    <script src="assets/toast.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f3f4f6;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }

        .status-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .gym-name {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6b7280;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .member-name {
            font-size: 28px;
            font-weight: bold;
            color: #111827;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
            margin: 20px 0;
        }

        .status-active {
            background: #dcfce7;
            color: #166534;
        }

        .status-expiring {
            background: #fef9c3;
            color: #854d0e;
        }

        .status-expired {
            background: #fee2e2;
            color: #991b1b;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #f3f4f6;
            text-align: left;
            gap: 12px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #6b7280;
            font-size: 14px;
            flex-shrink: 0;
        }

        .detail-value {
            font-weight: 600;
            color: #111827;
            text-align: right;
            word-break: break-word;
        }

        @media (max-width: 480px) {
            .status-card {
                padding: 30px 20px;
            }

            .member-name {
                font-size: 24px;
            }
        }
    </style>
    <script src="assets/theme.js"></script>
</head>

<body>

    <div class="status-card" id="status-container" style="display: none;">
        <div class="gym-name" id="gym-name">Gym Name</div>

        <!-- Icon -->
        <div style="font-size: 48px; margin-bottom: 16px;">
            <div id="status-icon">👤</div>
        </div>

        <div class="member-name" id="member-name">Member Name</div>

        <div id="status-badge" class="status-badge status-active">
            Active
        </div>

        <div style="margin-top: 24px;">
            <div class="detail-row">
                <span class="detail-label">Current Plan</span>
                <span class="detail-value" id="plan-name">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Expires On</span>
                <span class="detail-value" id="expiry-date">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Days Remaining</span>
                <span class="detail-value" id="days-left">-</span>
            </div>
        </div>
    </div>

    <div id="loading" style="text-align: center; color: #6b7280;">
        Loading your membership details...
    </div>
    <div id="error"
        style="display: none; text-align: center; color: #ef4444; background: #fee2e2; padding: 20px; border-radius: 12px;">
        Sorry, we couldn't find your membership details.<br>Please contact your gym.
    </div>

    <script>
        async function loadStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            const memberId = urlParams.get('id');

            if (!memberId) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                return;
            }

            try {
                // Fetch public status (no token needed)
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/public/members/${memberId}`);

                if (!response.ok) throw new Error('Not found');

                const data = await response.json();

                // Populate data
                document.getElementById('gym-name').textContent = data.gym_name;
                document.getElementById('member-name').textContent = data.member_name;
                document.getElementById('plan-name').textContent = data.plan_name;
                document.getElementById('expiry-date').textContent = data.expiry_date;

                const daysLeft = data.days_left;
                document.getElementById('days-left').textContent = daysLeft > 0 ? `${daysLeft} days` : 'Expired';

                // Handle Status Formatting
                const badge = document.getElementById('status-badge');
                const icon = document.getElementById('status-icon');

                if (daysLeft < 0 || data.status === 'expired') {
                    badge.className = 'status-badge status-expired';
                    badge.textContent = 'Expired';
                    icon.textContent = '⚠️';
                } else if (daysLeft <= 3 || data.status === 'expiring_soon') {
                    badge.className = 'status-badge status-expiring';
                    badge.textContent = 'Expiring Soon';
                    icon.textContent = '⏳';
                } else {
                    badge.className = 'status-badge status-active';
                    badge.textContent = 'Active';
                    icon.textContent = '✅';
                }

                // Show card
                document.getElementById('loading').style.display = 'none';
                document.getElementById('status-container').style.display = 'block';

            } catch (error) {
                console.error(error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }

        loadStatus();
    </script>
</body>

</html>
